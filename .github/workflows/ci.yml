name: CI

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests (with secrets injected)
        env:
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          DB_PASS: ${{ secrets.DB_PASS }}
        run: |
          # Demonstration: do NOT print secrets. Show that they exist.
          if [ -z "${SECRET_KEY}" ]; then echo "SECRET_KEY not set"; exit 1; fi
          if [ -z "${DB_PASS}" ]; then echo "DB_PASS not set"; exit 1; fi
          echo "Secrets injected; running tests..."
          # Replace with your actual test/commands, e.g.:
          pytest -q
