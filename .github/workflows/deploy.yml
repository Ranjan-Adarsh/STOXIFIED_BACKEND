name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Build Docker image
        run: |
          docker build -t stoxified-backend:latest .

      - name: Log in to Docker Hub
        if: ${{ secrets.DOCKERHUB_USERNAME && secrets.DOCKERHUB_TOKEN }}
        run: |
          echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login --username "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Push Docker image
        if: ${{ secrets.DOCKERHUB_USERNAME && secrets.DOCKERHUB_TOKEN }}
        run: |
          docker tag stoxified-backend:latest ${{ secrets.DOCKERHUB_USERNAME }}/stoxified-backend:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/stoxified-backend:latest

      - name: Deployment note
        run: |
          echo "Deploy step requires a separate host service or custom deployment commands."
          echo "Use Render/Railway/Fly with the pushed image, or add a provider-specific deploy step."
