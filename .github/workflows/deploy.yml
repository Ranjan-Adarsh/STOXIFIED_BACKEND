name: CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run tests (with secrets injected)
        env:
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          DB_PASS: ${{ secrets.DB_PASS }}
        run: |
          # Demonstration: do NOT print secrets. Show that they exist.
          if [ -z "${SECRET_KEY}" ]; then echo "SECRET_KEY not set"; exit 1; fi
          if [ -z "${DB_PASS}" ]; then echo "DB_PASS not set"; exit 1; fi
          echo "Secrets injected; running tests..."
          if find . -maxdepth 3 \( -name 'test_*.py' -o -name '*_test.py' \) | read; then
            pytest -q
          else
            echo "No pytest test files found; validating Python syntax instead."
            python -m compileall app
          fi

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Build Docker image
        run: |
          docker build -t stoxified-backend:latest .

      - name: Log in to Docker Hub
        if: ${{ secrets.DOCKERHUB_USERNAME != '' && secrets.DOCKERHUB_TOKEN != '' }}
        run: |
          echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login --username "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Push Docker image
        if: ${{ secrets.DOCKERHUB_USERNAME != '' && secrets.DOCKERHUB_TOKEN != '' }}
        run: |
          DOCKERHUB_REPOSITORY="${{ secrets.DOCKERHUB_REPOSITORY }}"
          DOCKERHUB_REPOSITORY="${DOCKERHUB_REPOSITORY:-stoxified_backend}"
          IMAGE="${{ secrets.DOCKERHUB_USERNAME }}"/${DOCKERHUB_REPOSITORY}:latest
          docker tag stoxified-backend:latest "$IMAGE"
          docker push "$IMAGE"

      - name: Docker image info
        if: ${{ secrets.DOCKERHUB_USERNAME != '' && secrets.DOCKERHUB_TOKEN != '' }}
        run: |
          DOCKERHUB_REPOSITORY="${{ secrets.DOCKERHUB_REPOSITORY }}"
          DOCKERHUB_REPOSITORY="${DOCKERHUB_REPOSITORY:-stoxified_backend}"
          echo "Docker image pushed: ${{ secrets.DOCKERHUB_USERNAME }}/$DOCKERHUB_REPOSITORY:latest"

      - name: Deployment note
        run: |
          echo "Docker image built and published to Docker Hub."
          echo "Configure Render to pull from: ${{ secrets.DOCKERHUB_USERNAME }}/$DOCKERHUB_REPOSITORY:latest"
