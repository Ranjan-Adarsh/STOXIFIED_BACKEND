name: Keep Render Alive

on:
  workflow_dispatch:
  schedule:
    - cron: '*/5 * * * *'  # Every 5 minutes

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        env:
          RENDER_URL: ${{ secrets.RENDER_URL }}
        run: |
          curl -f "$RENDER_URL/health" || echo "Health check failed"
